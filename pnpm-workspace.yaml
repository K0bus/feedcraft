packages:
  - 'apps/*'
  - 'packages/*'

allowBuilds:
  '@google/genai': true
  '@parcel/watcher': true
  '@prisma/client': true
  '@prisma/engines': true
  esbuild: true
  msgpackr-extract: true
  prisma: true
  protobufjs: true
  vue-demi: true

onlyBuiltDependencies:
  - '@google/genai'
  - '@parcel/watcher'
  - '@prisma/client'
  - '@prisma/engines'
  - 'esbuild'
  - 'msgpackr-extract'
  - 'prisma'
  - 'protobufjs'
  - 'vue-demi'
