services:
  postgres:
    image: postgres:16-alpine
    container_name: feedcrafter_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: feedcrafter
      POSTGRES_PASSWORD: feedcrafter_pass
      POSTGRES_DB: feedcrafter_db
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U feedcrafter -d feedcrafter_db']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: feedcrafter_redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
