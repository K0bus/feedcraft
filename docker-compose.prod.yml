services:
  postgres:
    image: postgres:16-alpine
    container_name: feedcrafter_prod_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-feedcrafter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_in_prod}
      POSTGRES_DB: ${POSTGRES_DB:-feedcrafter_db}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - feedcrafter_network
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-feedcrafter}']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: feedcrafter_prod_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis_pass_prod}
    volumes:
      - redis_prod_data:/data
    networks:
      - feedcrafter_network
    healthcheck:
      test: ['CMD-SHELL', 'redis-cli -a ${REDIS_PASSWORD:-redis_pass_prod} ping | grep PONG']
      interval: 10s
      timeout: 5s
      retries: 5

  migration:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: feedcrafter_prod_migration
    restart: "no"
    command: pnpm --filter @feedcrafter/database db:deploy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedcrafter}:${POSTGRES_PASSWORD:-change_in_prod}@postgres:5432/${POSTGRES_DB:-feedcrafter_db}?schema=public
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - feedcrafter_network

  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
    container_name: feedcrafter_prod_backend
    restart: always
    ports:
      - '4000:4000'
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedcrafter}:${POSTGRES_PASSWORD:-change_in_prod}@postgres:5432/${POSTGRES_DB:-feedcrafter_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass_prod}
      PORT_BACKEND: 4000
      JWT_SECRET: ${JWT_SECRET:-super_secret_jwt_key_change_me_in_production}
      SUPER_ADMIN_DISCORD_ID: ${SUPER_ADMIN_DISCORD_ID}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      DISCORD_CLIENT_ID: ${DISCORD_CLIENT_ID}
      DISCORD_CLIENT_SECRET: ${DISCORD_CLIENT_SECRET}
      DISCORD_REDIRECT_URI: ${DISCORD_REDIRECT_URI}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - feedcrafter_network

  worker:
    build:
      context: .
      dockerfile: apps/worker/Dockerfile
    container_name: feedcrafter_prod_worker
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedcrafter}:${POSTGRES_PASSWORD:-change_in_prod}@postgres:5432/${POSTGRES_DB:-feedcrafter_db}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_pass_prod}
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      TWITCH_CLIENT_ID: ${TWITCH_CLIENT_ID}
      TWITCH_CLIENT_SECRET: ${TWITCH_CLIENT_SECRET}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - feedcrafter_network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
    container_name: feedcrafter_prod_frontend
    restart: always
    ports:
      - '3000:3000'
    environment:
      NODE_ENV: production
      BACKEND_URL: http://backend:4000
      NUXT_PUBLIC_API_BASE_URL: ${FRONTEND_API_BASE_URL:-}
    depends_on:
      - backend
    networks:
      - feedcrafter_network

  bot:
    build:
      context: .
      dockerfile: apps/bot/Dockerfile
    container_name: feedcrafter_prod_bot
    restart: always
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-feedcrafter}:${POSTGRES_PASSWORD:-change_in_prod}@postgres:5432/${POSTGRES_DB:-feedcrafter_db}?schema=public
      DISCORD_BOT_TOKEN: ${DISCORD_BOT_TOKEN}
    depends_on:
      postgres:
        condition: service_healthy
      migration:
        condition: service_completed_successfully
    networks:
      - feedcrafter_network

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  feedcrafter_network:
    driver: bridge
